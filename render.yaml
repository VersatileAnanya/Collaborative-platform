services:
  # ─── Backend: Node.js + Express + Socket.io ─────────────────────────────────
  - type: web
    name: collaborative-platform-server
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false   # Set this manually in Render dashboard
      - key: JDOODLE_CLIENT_ID
        sync: false   # Set this manually in Render dashboard
      - key: JDOODLE_CLIENT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-v4-flash
      - key: OPENROUTER_APP_TITLE
        value: Collaborative Platform

  # ─── Frontend: React + Vite Static Site ─────────────────────────────────────
  - type: web
    name: collaborative-platform-client
    runtime: static
    region: singapore
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SOCKET_URL
        sync: false   # Set to your server URL in Render dashboard
      - key: VITE_API_URL
        sync: false   # Set to your server URL in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
